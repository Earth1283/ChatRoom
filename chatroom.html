<!-- chatroom.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatroom</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="chat-container">
    <ul id="messages"></ul>
  </div>
  <input type="text" id="messageInput" placeholder="Type your message...">
  <button id="sendButton">Send</button>
  <div id="typingIndicator"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const messagesList = document.getElementById("messages");
    const messageInput = document.getElementById("messageInput");
    const sendButton = document.getElementById("sendButton");
    const typingIndicator = document.getElementById("typingIndicator");

    // Listen for new messages
    socket.on('newMessage', (data) => {
      const li = document.createElement("li");
      li.textContent = `${data.username}: ${data.message}`;
      messagesList.appendChild(li);
      autoScrollToBottom(); // Scroll to bottom after adding a new message
    });

    // Listen for typing indicator
    socket.on('typing', (username) => {
      typingIndicator.textContent = `${username} is typing...`;
    });

    // Send new message when the send button is clicked
    sendButton.addEventListener("click", () => {
      const message = messageInput.value;
      if (message.trim()) {
        socket.emit('sendMessage', message, 'username'); // Replace 'username' with the actual username
        messageInput.value = ''; // Clear input field
      }
    });

    // Emit typing event when the user is typing
    messageInput.addEventListener('input', () => {
      socket.emit('typing', 'username'); // Replace 'username' with actual username
    });

    // Auto-scroll to bottom
    function autoScrollToBottom() {
      const chatContainer = document.querySelector('.chat-container');
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }
  </script>
</body>
</html>
